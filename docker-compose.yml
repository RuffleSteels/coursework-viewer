version: "3.9"

services:
  web:
    build: .
    container_name: coursework
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      # Mount the entire public directory from the host to the container.
      # This ensures processed presentations and static assets are shared.
      - ./public:/app/public
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
